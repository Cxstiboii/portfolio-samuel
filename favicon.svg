<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a18"/>
      <stop offset="100%" stop-color="#0C0C0B"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Subtle border -->
  <rect width="63" height="63" x="0.5" y="0.5" rx="13.5" fill="none" stroke="#272625" stroke-width="1"/>

  <!-- S letter -->
  <text
    x="11"
    y="46"
    font-family="'Inter', 'Space Grotesk', system-ui, sans-serif"
    font-weight="800"
    font-size="36"
    fill="#FFFFFF"
    letter-spacing="-1"
  >S</text>

  <!-- / slash in accent color -->
  <text
    x="34"
    y="46"
    font-family="'Inter', 'Space Grotesk', system-ui, sans-serif"
    font-weight="700"
    font-size="36"
    fill="#CBFF00"
    letter-spacing="-1"
  >/</text>

  <!-- Small accent dot bottom-right -->
  <circle cx="56" cy="52" r="3" fill="#CBFF00" opacity="0.7"/>
</svg>
